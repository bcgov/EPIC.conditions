apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}
  labels:
{{ include "condition-cron.labels" . | indent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.name }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  template:
    metadata:
      labels:
        app: {{ .Values.name }}
        app-group: condition-app
        environment: {{ .Values.env }}
    spec:
      containers:
        - name: {{ .Values.name }}
          image: image-registry.openshift-image-registry.svc:5000/{{ .Values.imageNamespace }}/{{ .Values.name }}:{{ .Values.imageTag }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          volumeMounts:
            - name: cron-config
              readOnly: true
              mountPath: /condition-cron/cron/
          env:
            - name: FLASK_ENV
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.name }}-config
                  key: FLASK_ENV
            - name: DATABASE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.secret }}
                  key: app-db-username
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.secret }}
                  key: app-db-password
            - name: DATABASE_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.secret }}
                  key: app-db-name
            - name: DATABASE_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.name }}-config
                  key: DATABASE_HOST
            - name: DATABASE_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.name }}-config
                  key: DATABASE_PORT
            - name: S3_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.name }}-config
                  key: S3_BUCKET
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.name }}
                  key: S3_ACCESS_KEY_ID
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.name }}
                  key: S3_SECRET_ACCESS_KEY
            - name: S3_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.name }}-config
                  key: S3_HOST
            - name: S3_REGION
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.name }}-config
                  key: S3_REGION
            - name: S3_SERVICE
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.name }}-config
                  key: S3_SERVICE
            - name: EXTRACTOR_API_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.name }}-config
                  key: EXTRACTOR_API_URL
            - name: EXTRACTOR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.name }}
                  key: EXTRACTOR_API_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.name }}
                  key: OPENAI_API_KEY
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
          terminationMessagePath: "/dev/termination-log"
          terminationMessagePolicy: File
      volumes:
        - name: cron-config
          configMap:
            name: {{ .Values.name }}-config
            defaultMode: 420
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      securityContext: {}
      schedulerName: default-scheduler
